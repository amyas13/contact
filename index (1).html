<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amyas Aouane — Contact</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #121214;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(201,169,110,0.4);
    --text: #f0ede8;
    --muted: #888680;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.15);
    --radius: 18px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    background-image: radial-gradient(circle at 50% -20%, #1c1c1f 0%, #0a0a0b 100%);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
    overflow-x: hidden;
  }

  /* Effet de grain pour faire moins "IA" */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03;
    z-index: 100;
    pointer-events: none;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    z-index: 10;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeBlur 0.8s ease out;
  }

  @keyframes fadeBlur {
    from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
    to { opacity: 1; filter: blur(0); transform: translateY(0); }
  }

  .avatar {
    width: 72px; height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--surface), var(--bg));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 22px; color: var(--accent);
    margin: 0 auto 1.5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px var(--accent-dim);
  }

  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
  .subtitle { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.6; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .btn {
    display: flex; flex-direction: column; gap: 12px;
    padding: 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none; color: var(--text);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative; overflow: hidden;
    /* Animation d'entrée séquentielle */
    opacity: 0; animation: slideUp 0.5s ease forwards;
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Délais d'apparition pour le côté vivant */
  .btn:nth-child(1) { animation-delay: 0.1s; transform: translateY(20px); }
  .btn:nth-child(2) { animation-delay: 0.2s; transform: translateY(20px); }
  .btn:nth-child(3) { animation-delay: 0.3s; transform: translateY(20px); }
  .btn:nth-child(4) { animation-delay: 0.4s; transform: translateY(20px); }
  .btn:nth-child(5) { animation-delay: 0.5s; transform: translateY(20px); grid-column: span 2; }

  .btn:hover {
    border-color: var(--border-hover);
    background: #1a1a1c;
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  }

  .btn-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    display: flex; align-items: center; justify-content: center;
  }

  .btn-label { font-size: 0.85rem; font-weight: 600; display: block; margin-top: 4px; }
  .btn-sub { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .tag {
    font-size: 0.6rem; padding: 3px 8px; border-radius: 20px;
    background: var(--accent-dim); color: var(--accent);
    margin-top: 8px; display: inline-block; text-transform: uppercase; letter-spacing: 0.05em;
  }

  .footer {
    margin-top: 3rem; text-align: center; font-size: 0.7rem;
    color: var(--muted); font-family: 'DM Mono', monospace; opacity: 0.5;
  }
</style>
</head>
