<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amyas Aouane — Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0e;
    --surface: #161618;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --muted: #888680;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --radius: 14px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--accent);
    margin: 0 auto 1.25rem;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 0.35rem;
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 1.1rem 1.1rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: var(--accent-dim);
    transition: opacity 0.18s;
  }

  .btn:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  .btn-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
  }

  .btn-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
    position: relative;
  }

  .btn-sub {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    position: relative;
    line-height: 1.5;
  }

  .btn-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }

  .tag {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    background: var(--accent-dim);
    color: var(--accent);
    position: relative;
  }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 1rem auto;
  }
</style>
</head>
